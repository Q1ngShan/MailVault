name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── macOS arm64 (Apple Silicon) ────────────────────────────────────────────
  build-macos-arm64:
    name: macOS (Apple Silicon)
    runs-on: macos-14          # M1 runner
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails v3
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest

      - name: Install frontend deps
        run: cd frontend && npm ci

      - name: Generate bindings
        run: wails3 generate bindings

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Build binary
        run: |
          CGO_ENABLED=1 GOARCH=arm64 \
            go build -tags production -trimpath -buildvcs=false \
            -ldflags="-w -s" \
            -o bin/mailvault-macos-arm64 .

      - name: Package .app
        run: |
          APP="bin/MailVault-arm64.app"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp bin/mailvault-macos-arm64 "$APP/Contents/MacOS/mailvault"
          cp build/darwin/icons.icns "$APP/Contents/Resources/icons.icns"
          cat > "$APP/Contents/Info.plist" << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>CFBundleName</key><string>MailVault</string>
            <key>CFBundleExecutable</key><string>mailvault</string>
            <key>CFBundleIdentifier</key><string>com.mailvault.app</string>
            <key>CFBundleVersion</key><string>${{ github.ref_name }}</string>
            <key>CFBundleShortVersionString</key><string>${{ github.ref_name }}</string>
            <key>CFBundleIconFile</key><string>icons</string>
            <key>LSMinimumSystemVersion</key><string>10.15.0</string>
            <key>NSHighResolutionCapable</key><true/>
          </dict></plist>
          EOF
          cd bin && zip -r MailVault-macos-arm64.zip MailVault-arm64.app
          echo "artifact=bin/MailVault-macos-arm64.zip" >> $GITHUB_ENV

      - uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: bin/MailVault-macos-arm64.zip

  # ── macOS amd64 (Intel) ────────────────────────────────────────────────────
  build-macos-amd64:
    name: macOS (Intel)
    runs-on: macos-13          # x86_64 runner
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails v3
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest

      - name: Install frontend deps
        run: cd frontend && npm ci

      - name: Generate bindings
        run: wails3 generate bindings

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Build binary
        run: |
          CGO_ENABLED=1 GOARCH=amd64 \
            go build -tags production -trimpath -buildvcs=false \
            -ldflags="-w -s" \
            -o bin/mailvault-macos-amd64 .

      - name: Package .app
        run: |
          APP="bin/MailVault-amd64.app"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp bin/mailvault-macos-amd64 "$APP/Contents/MacOS/mailvault"
          cp build/darwin/icons.icns "$APP/Contents/Resources/icons.icns"
          cat > "$APP/Contents/Info.plist" << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>CFBundleName</key><string>MailVault</string>
            <key>CFBundleExecutable</key><string>mailvault</string>
            <key>CFBundleIdentifier</key><string>com.mailvault.app</string>
            <key>CFBundleVersion</key><string>${{ github.ref_name }}</string>
            <key>CFBundleShortVersionString</key><string>${{ github.ref_name }}</string>
            <key>CFBundleIconFile</key><string>icons</string>
            <key>LSMinimumSystemVersion</key><string>10.15.0</string>
            <key>NSHighResolutionCapable</key><true/>
          </dict></plist>
          EOF
          cd bin && zip -r MailVault-macos-amd64.zip MailVault-amd64.app

      - uses: actions/upload-artifact@v4
        with:
          name: macos-amd64
          path: bin/MailVault-macos-amd64.zip

  # ── Windows amd64 ──────────────────────────────────────────────────────────
  build-windows:
    name: Windows (x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails v3
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest

      - name: Install frontend deps
        run: cd frontend && npm ci

      - name: Generate bindings
        run: wails3 generate bindings

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Build binary
        shell: bash
        run: |
          mkdir -p bin
          CGO_ENABLED=1 GOOS=windows GOARCH=amd64 \
            go build -tags production -trimpath -buildvcs=false \
            -ldflags="-w -s -H=windowsgui" \
            -o bin/MailVault-windows-amd64.exe .

      - uses: actions/upload-artifact@v4
        with:
          name: windows-amd64
          path: bin/MailVault-windows-amd64.exe

  # ── Linux amd64 ────────────────────────────────────────────────────────────
  build-linux:
    name: Linux (x64)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev libwebkit2gtk-4.1-dev \
            build-essential pkg-config

      - name: Install Wails v3
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest

      - name: Install frontend deps
        run: cd frontend && npm ci

      - name: Generate bindings
        run: wails3 generate bindings

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Build binary
        run: |
          mkdir -p bin
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 \
            go build -tags production -trimpath -buildvcs=false \
            -ldflags="-w -s" \
            -o bin/MailVault-linux-amd64 .
          chmod +x bin/MailVault-linux-amd64
          cd bin && tar -czf MailVault-linux-amd64.tar.gz MailVault-linux-amd64

      - uses: actions/upload-artifact@v4
        with:
          name: linux-amd64
          path: bin/MailVault-linux-amd64.tar.gz

  # ── Create GitHub Release ──────────────────────────────────────────────────
  release:
    name: Publish Release
    needs: [build-macos-arm64, build-macos-amd64, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: MailVault ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            artifacts/macos-arm64/MailVault-macos-arm64.zip
            artifacts/macos-amd64/MailVault-macos-amd64.zip
            artifacts/windows-amd64/MailVault-windows-amd64.exe
            artifacts/linux-amd64/MailVault-linux-amd64.tar.gz
          body: |
            ## MailVault ${{ github.ref_name }}

            | 平台 | 文件 | 说明 |
            |------|------|------|
            | macOS Apple Silicon | `MailVault-macos-arm64.zip` | M1/M2/M3 Mac |
            | macOS Intel | `MailVault-macos-amd64.zip` | Intel Mac |
            | Windows x64 | `MailVault-windows-amd64.exe` | Windows 10/11 |
            | Linux x64 | `MailVault-linux-amd64.tar.gz` | Ubuntu/Debian |

            ### 安装说明
            - **macOS**: 解压后将 `.app` 拖入应用程序文件夹，首次运行需右键→打开
            - **Windows**: 直接运行 `.exe`
            - **Linux**: 解压后 `chmod +x` 运行
